services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-printuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-local-db-password}
      POSTGRES_DB: ${DB_NAME:-printsales}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-printuser} -d ${DB_NAME:-printsales}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://printuser:change-me-local-db-password@db:5432/printsales}
      SECRET_KEY: ${SECRET_KEY:-generate-a-random-local-secret-key}
      ENVIRONMENT: development
      BACKEND_CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-local-admin-password}
      RATE_LIMIT_PER_MINUTE: "120"
      RATE_LIMIT_BURST: "30"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
