services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: printuser
      POSTGRES_PASSWORD: printpass
      POSTGRES_DB: printsales
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printuser -d printsales"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://printuser:printpass@db:5432/printsales
      SECRET_KEY: dev-secret-key-change-in-prod
      BACKEND_CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
